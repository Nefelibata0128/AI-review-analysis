<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传页 — AI评论分析平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
  --surface: #ffffff;
  --surface-card: #f8f9fa;
  --surface-soft: #f1f3f4;
  --ink: #1a1c1e;
  --body: #444746;
  --mute: #757575;
  --primary: #0050cb;
  --primary-hover: #0044b5;
  --primary-container: #e8edff;
  --hairline: #dadce0;
  --hairline-soft: #e8eaed;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--surface-soft);
  color: var(--ink);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
}
.container { width: 100%; max-width: 560px; }

/* Scene Tabs */
.scene-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.scene-tab {
  flex: 1; padding: 12px 16px; border: 1px solid var(--hairline);
  border-radius: var(--radius-md); background: var(--surface);
  font-family: var(--font-sans); font-size: 14px; font-weight: 500;
  color: var(--body); cursor: pointer; transition: all .2s; text-align: center;
}
.scene-tab:hover { border-color: var(--primary); background: var(--primary-container); }
.scene-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Upload Zone */
.upload-zone {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 28px;
  box-shadow: var(--shadow-card);
}
.upload-zone h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.upload-zone .subtitle { font-size: 13px; color: var(--mute); margin-bottom: 20px; }

/* Upload Cards */
.upload-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.upload-card {
  display: flex; align-items: center; gap: 12px;
  padding: 16px; border: 2px dashed var(--hairline);
  border-radius: var(--radius-md); cursor: pointer;
  transition: all .2s; background: var(--surface-card);
}
.upload-card:hover { border-color: var(--primary); background: var(--primary-container); }
.upload-card.has-file { border-style: solid; border-color: var(--primary); background: var(--primary-container); }
.upload-card .uc-icon { font-size: 24px; flex-shrink: 0; }
.upload-card .uc-info { flex: 1; min-width: 0; }
.upload-card .uc-label { font-size: 14px; font-weight: 500; }
.upload-card .uc-hint { font-size: 11px; color: var(--mute); margin-top: 2px; }
.upload-card .uc-filename { font-size: 12px; color: var(--primary); font-weight: 500; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upload-card .uc-badge { font-size: 10px; padding: 2px 8px; border-radius: var(--radius-full); font-weight: 500; }
.upload-card .uc-badge.required { background: #fce8e6; color: #c5221f; }
.upload-card .uc-badge.optional { background: #e8f5e9; color: #1e8e3e; }

/* Mode Selector */
.mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
.mode-option {
  flex: 1; padding: 14px; border: 1px solid var(--hairline);
  border-radius: var(--radius-md); cursor: pointer; transition: all .2s;
  background: var(--surface); position: relative;
}
.mode-option:hover { border-color: var(--primary); }
.mode-option:has(input:checked) { border-color: var(--primary); background: var(--primary-container); }
.mode-option input { display: none; }
.mode-label { font-size: 14px; font-weight: 600; color: var(--ink); display: block; }
.mode-desc { font-size: 11px; color: var(--mute); margin-top: 4px; display: block; }
.mode-option:has(input:checked) .mode-label { color: var(--primary); }

/* CTA Button */
.btn-analyze {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
  background: var(--primary); color: #fff; font-family: var(--font-sans);
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-analyze:hover { background: var(--primary-hover); }
.btn-analyze:disabled { opacity: .6; cursor: not-allowed; }
.btn-analyze .btn-icon { font-size: 18px; }
</style>
</head>
<body>

<div class="container">
  <!-- Scene Tabs -->
  <div class="scene-tabs">
    <button class="scene-tab active" onclick="switchScene(this, 'feedback')">用户反馈分析</button>
    <button class="scene-tab" onclick="switchScene(this, 'competitor')">竞品分析</button>
  </div>

  <!-- Upload Zone -->
  <div class="upload-zone">
    <h2 id="sceneTitle">上传分析文件</h2>
    <p class="subtitle" id="sceneSub">支持 .txt / .docx / .md 格式</p>

    <div class="upload-cards">
      <label class="upload-card" id="cardFile1">
        <span class="uc-icon">📄</span>
        <span class="uc-info">
          <span class="uc-label" id="labelFile1">用户评论数据</span>
          <span class="uc-hint">.txt Markdown 表格格式</span>
        </span>
        <span class="uc-badge required" id="badge1">必填</span>
        <input type="file" accept=".txt,.md,.docx" hidden onchange="onFilePicked(this, 'cardFile1')">
      </label>

      <label class="upload-card" id="cardFile2">
        <span class="uc-icon">📋</span>
        <span class="uc-info">
          <span class="uc-label" id="labelFile2">产品背景文档</span>
          <span class="uc-hint">.docx / .md PRD 或产品介绍</span>
        </span>
        <span class="uc-badge optional" id="badge2">可选</span>
        <input type="file" accept=".txt,.md,.docx" hidden onchange="onFilePicked(this, 'cardFile2')">
      </label>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <label class="mode-option">
        <input type="radio" name="mode" value="multi" checked>
        <span class="mode-label">深度分析（多 Agent）</span>
        <span class="mode-desc">5 步推进，进度可见，更精准</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="single">
        <span class="mode-label">快速分析（单工作流）</span>
        <span class="mode-desc">一次完成，速度更快</span>
      </label>
    </div>

    <button class="btn-analyze" onclick="handleStart()">
      <span class="btn-icon">🔍</span> 开始分析
    </button>
  </div>
</div>

<script>
function switchScene(btn, scene) {
  document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (scene === 'feedback') {
    document.getElementById('sceneTitle').textContent = '上传分析文件';
    document.getElementById('sceneSub').textContent = '支持 .txt / .docx / .md 格式';
    document.getElementById('labelFile1').textContent = '用户评论数据';
    document.getElementById('labelFile2').textContent = '产品背景文档';
  } else {
    document.getElementById('sceneTitle').textContent = '上传竞品分析文件';
    document.getElementById('sceneSub').textContent = '支持 .txt / .docx / .md 格式';
    document.getElementById('labelFile1').textContent = '竞品信息文件';
    document.getElementById('labelFile2').textContent = '产品背景文档';
  }
}
function onFilePicked(input, cardId) {
  var card = document.getElementById(cardId);
  if (input.files.length) card.classList.add('has-file');
  else card.classList.remove('has-file');
}
function handleStart() { alert('原型演示：分析已启动'); }
</script>
</body>
</html>
